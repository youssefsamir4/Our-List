<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Adventure List 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #E8A598;
      --blush: #F5DDD9;
      --sand: #F9F2EE;
      --mocha: #5C3D35;
      --sage: #A8B89C;
      --cream: #FEFAF7;
      --bg: #FBF6F3;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 80px;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--cream);
      border-radius: 24px;
      max-width: 500px;
      width: 100%;
      padding: 44px 36px 48px;
      box-shadow: 0 8px 40px rgba(92,61,53,.10), 0 2px 8px rgba(92,61,53,.06);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .blob-tr { position:absolute; top:-44px; right:-44px; width:160px; height:160px; border-radius:50%; background:var(--blush); opacity:.5; pointer-events:none; animation: blobPulse 6s ease-in-out infinite; }
    .blob-bl { position:absolute; bottom:-50px; left:-30px; width:140px; height:140px; border-radius:50%; background:var(--sage); opacity:.15; pointer-events:none; animation: blobPulse 8s ease-in-out infinite reverse; }
    @keyframes blobPulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* ── Header ───────────────────────────────────────── */
    .header { text-align:center; margin-bottom:28px; position:relative; }
    .hearts { font-size:20px; letter-spacing:6px; margin-bottom:8px; display:block; animation: heartBeat 2s ease-in-out infinite; }
    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      15%      { transform: scale(1.15); }
      30%      { transform: scale(1); }
      45%      { transform: scale(1.08); }
    }
    h1 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:500; color:var(--mocha); line-height:1.2; }
    h1 em { font-style:italic; color:var(--rose); }
    .subtitle { margin-top:8px; font-size:.78rem; font-weight:300; color:#9B7B74; letter-spacing:.09em; text-transform:uppercase; }
    .divider { width:40px; height:2px; background:var(--rose); border-radius:2px; margin:14px auto 0; opacity:.65; }
    .sync-note { text-align:center; font-size:.72rem; color:#C4A49E; margin-bottom:16px; letter-spacing:.03em; }

    /* ── List items ───────────────────────────────────── */
    #todo-list { list-style:none; display:flex; flex-direction:column; gap:10px; }

    .item {
      background: var(--sand);
      border-radius: 16px;
      border: 1.5px solid transparent;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
      animation: itemIn 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    .item:hover { border-color: var(--rose); box-shadow: 0 2px 12px rgba(232,165,152,.15); }
    .item.done  { background: #EFF6EC; border-color: var(--sage); }

    @keyframes itemIn {
      from { opacity:0; transform: translateX(-12px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      cursor: pointer;
    }

    .check-circle {
      flex-shrink:0; width:24px; height:24px; border-radius:50%;
      border:2px solid var(--rose); background:white;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; color:white; font-weight:700;
      transition: background .25s, border-color .25s, transform .2s;
    }
    .check-circle:hover { transform: scale(1.15); }
    .item.done .check-circle { background:var(--sage); border-color:var(--sage); }

    .item-emoji { font-size:1.3rem; flex-shrink:0; width:28px; text-align:center; }
    .item-text  { font-size:.93rem; color:var(--mocha); font-weight:400; flex:1; transition:color .2s; }
    .item.done .item-text { text-decoration:line-through; color:#9BB28F; }

    .item-actions { display:flex; gap:6px; align-items:center; }

    .photo-btn {
      background: none; border: 1.5px solid var(--rose); border-radius: 8px;
      padding: 4px 8px; cursor: pointer; font-size: .72rem; color: var(--rose);
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .photo-btn:hover { background: var(--rose); color: white; }
    .photo-btn.has-photo { background: var(--rose); color: white; }

    .del-btn {
      background:none; border:none; cursor:pointer; font-size:.8rem;
      color:#C4A49E; padding:4px 5px; border-radius:6px;
      transition: color .15s, transform .15s; line-height:1;
    }
    .del-btn:hover { color: #a0635a; transform: scale(1.2); }

    /* ── Photo section ────────────────────────────────── */
    .photo-section {
      display: none;
      padding: 0 16px 14px;
      animation: slideDown .25s ease;
    }
    .photo-section.open { display: block; }
    @keyframes slideDown {
      from { opacity:0; transform: translateY(-6px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .photo-upload-area {
      border: 2px dashed var(--rose);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: background .18s;
      background: white;
      position: relative;
    }
    .photo-upload-area:hover { background: var(--blush); }
    .photo-upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .photo-upload-area .upload-hint { font-size:.8rem; color:#9B7B74; }
    .photo-upload-area .upload-icon { font-size:1.6rem; margin-bottom:6px; display:block; }

    .photo-preview {
      display: none;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }
    .photo-preview img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }
    .photo-preview .remove-photo {
      position: absolute; top:8px; right:8px;
      background: rgba(92,61,53,.7); color: white; border: none;
      border-radius: 99px; padding: 4px 10px; cursor: pointer;
      font-size: .75rem; font-family: 'DM Sans', sans-serif;
      transition: background .15s;
    }
    .photo-preview .remove-photo:hover { background: rgba(92,61,53,1); }

    /* ── Add panel ────────────────────────────────────── */
    #add-open-btn {
      display:flex; align-items:center; gap:8px; margin-top:14px; width:100%;
      background:var(--sand); border:1.5px dashed var(--rose); border-radius:14px;
      padding:13px 18px; cursor:pointer; color:var(--rose);
      font-size:.88rem; font-family:'DM Sans',sans-serif;
      font-weight:500; letter-spacing:.03em; transition:background .18s, transform .15s;
    }
    #add-open-btn:hover { background:var(--blush); transform: translateY(-1px); }

    #add-panel {
      display:none; margin-top:14px; background:var(--blush);
      border-radius:14px; padding:16px 18px;
      animation: slideDown .2s ease;
    }
    .add-row { display:flex; gap:10px; align-items:center; margin-bottom:10px; }
    #emoji-trigger {
      font-size:1.4rem; background:white; border:1.5px solid var(--rose);
      border-radius:10px; width:44px; height:44px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition: transform .15s;
    }
    #emoji-trigger:hover { transform: scale(1.1); }
    #new-text {
      flex:1; border:1.5px solid var(--rose); border-radius:10px;
      padding:10px 14px; font-size:.9rem; font-family:'DM Sans',sans-serif;
      background:white; color:var(--mocha); transition: border-color .18s;
    }
    #new-text:focus { outline:none; border-color:#C4706A; }
    #emoji-grid {
      display:none; flex-wrap:wrap; gap:6px;
      background:white; border-radius:10px; padding:10px; margin-bottom:12px;
    }
    .emoji-opt {
      font-size:1.2rem; background:none; border:none; cursor:pointer;
      width:34px; height:34px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      transition:background .12s, transform .12s;
    }
    .emoji-opt:hover { background:var(--blush); transform:scale(1.2); }
    .add-actions { display:flex; gap:8px; justify-content:flex-end; }
    #add-cancel {
      background:none; border:none; cursor:pointer;
      font-size:.82rem; color:#9B7B74; padding:8px 14px; border-radius:99px;
      font-family:'DM Sans',sans-serif; transition: color .15s;
    }
    #add-cancel:hover { color: var(--mocha); }
    #add-confirm {
      background:var(--rose); border:none; cursor:pointer;
      font-size:.82rem; color:white; font-weight:500;
      padding:8px 20px; border-radius:99px;
      font-family:'DM Sans',sans-serif; letter-spacing:.03em;
      transition:background .15s, transform .15s;
    }
    #add-confirm:hover { background:#D98F82; transform: translateY(-1px); }

    /* ── Progress ─────────────────────────────────────── */
    .progress-section { margin-top:28px; }
    .progress-label { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .progress-label span { font-size:.76rem; color:#9B7B74; letter-spacing:.04em; }
    #progress-count { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--mocha); font-weight:500; }
    .progress-bar { height:7px; background:var(--blush); border-radius:99px; overflow:hidden; }
    #progress-fill {
      height:100%; background:linear-gradient(90deg,var(--rose),var(--sage));
      border-radius:99px; width:0%;
      transition:width .6s cubic-bezier(.4,0,.2,1);
    }
    #footer-note { text-align:center; margin-top:20px; font-size:.78rem; color:#C4A49E; font-style:italic; transition: opacity .3s; }

    /* ── Loading ──────────────────────────────────────── */
    #loading-msg { text-align:center; padding:40px 0; color:#C4A49E; font-size:.9rem; }
    .loading-dots::after { content:''; animation: dots 1.4s infinite; }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }
    #list-wrap { display:none; }

    /* ── Toast ────────────────────────────────────────── */
    #toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px);
      background:var(--mocha); color:#FBF6F3; border-radius:99px; padding:10px 22px;
      font-size:.82rem; letter-spacing:.03em;
      box-shadow:0 4px 20px rgba(92,61,53,.3); z-index:999;
      white-space:nowrap; opacity:0;
      transition:opacity .3s, transform .3s;
      pointer-events:none;
    }

    /* ── Confetti canvas ──────────────────────────────── */
    #confetti-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:998;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">
  <div class="blob-tr"></div>
  <div class="blob-bl"></div>

  <div class="header">
    <span class="hearts">♡ ♡ ♡</span>
    <h1>Our Little <em>Adventure</em> List</h1>
    <p class="subtitle">things to try together</p>
    <div class="divider"></div>
  </div>

  <p class="sync-note">🔴 live — changes show up for both of you instantly</p>

  <p id="loading-msg"><span class="loading-dots">loading your list</span></p>

  <div id="list-wrap">
    <ul id="todo-list"></ul>

    <div id="add-panel">
      <div class="add-row">
        <button id="emoji-trigger"><span id="selected-emoji">🌸</span></button>
        <input id="new-text" type="text" placeholder="what's next for you two?" />
      </div>
      <div id="emoji-grid"></div>
      <div class="add-actions">
        <button id="add-cancel">cancel</button>
        <button id="add-confirm">add to our list ♡</button>
      </div>
    </div>

    <button id="add-open-btn">
      <span style="font-size:1.1rem">+</span> add something new
    </button>

    <div class="progress-section">
      <div class="progress-label">
        <span>adventures completed</span>
        <span id="progress-count">0 / 0</span>
      </div>
      <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <p id="footer-note">tap anything to get started 💕</p>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as sRef, uploadString, getDownloadURL, deleteObject }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCUFKp7pnzvF4L1rvjdU3Uk-2TvT92tMO0",
    authDomain:        "our-to-do-list-1a666.firebaseapp.com",
    databaseURL:       "https://our-to-do-list-1a666-default-rtdb.firebaseio.com",
    projectId:         "our-to-do-list-1a666",
    storageBucket:     "our-to-do-list-1a666.firebasestorage.app",
    messagingSenderId: "774503475826",
    appId:             "1:774503475826:web:a14ac07ce0ecc08a6b30eb"
  };

  const DEFAULTS = [
    { text:"Spanish Latte",        emoji:"☕" },
    { text:"Bateekh Ne3na3",       emoji:"🍉" },
    { text:"Riding Horses",        emoji:"🐴" },
    { text:"Tarb w Kaware3",       emoji:"🍲" },
    { text:"Apple Halloumi Salad", emoji:"🥗" },
    { text:"Yogurt Bowl",          emoji:"🍓" },
    { text:"Cinema",               emoji:"🎬" },
  ];

  const EMOJIS = ["☕","🍉","🐴","🍲","🥗","🍓","🎬","🎡","🏖️","🌮","🍜","🍰",
    "🎭","🎸","🌿","🚴","🏊","🧁","🍕","🎳","🎨","🧘","🌸","🍦","🎲","🍣",
    "🥂","🌙","🎠","🏔️","🫶","🌷","🧋","🪷","🎪"];

  const app      = initializeApp(firebaseConfig);
  const db       = getDatabase(app);
  const storage  = getStorage(app);
  const listRef  = ref(db, "adventure-list");

  let seeded = false;
  let openPhotoId = null;
  let prevDoneCount = 0;

  // ── Listen ────────────────────────────────────────────────
  onValue(listRef, snap => {
    const data = snap.val();
    if (!data) {
      if (!seeded) { seeded = true; DEFAULTS.forEach(d => push(listRef, {...d, done:false, photo:""})); }
      return;
    }
    renderList(data);
  }, err => {
    document.getElementById("loading-msg").textContent = "Connection error — please refresh.";
  });

  // ── Render ────────────────────────────────────────────────
  function renderList(data) {
    const ul = document.getElementById("todo-list");
    ul.innerHTML = "";
    const entries = Object.entries(data);
    const doneCount = entries.filter(([,v]) => v.done).length;

    entries.forEach(([id, item], i) => {
      const li = document.createElement("li");
      li.className = "item" + (item.done ? " done" : "");
      li.style.animationDelay = (i * 0.06) + "s";

      const photoLabel = item.photo ? "📷 view photo" : "📷 add photo";

      li.innerHTML = `
        <div class="item-row">
          <div class="check-circle">${item.done ? "✓" : ""}</div>
          <span class="item-emoji">${item.emoji}</span>
          <span class="item-text">${esc(item.text)}</span>
          <div class="item-actions">
            <button class="photo-btn ${item.photo ? 'has-photo' : ''}">${photoLabel}</button>
            <button class="del-btn" title="remove">✕</button>
          </div>
        </div>
        <div class="photo-section ${openPhotoId === id ? 'open' : ''}" id="ps-${id}">
          <div class="photo-upload-area" id="upload-area-${id}" style="${item.photo ? 'display:none' : ''}">
            <input type="file" accept="image/*" id="file-input-${id}" />
            <span class="upload-icon">🌸</span>
            <div class="upload-hint">tap to upload a photo memory</div>
          </div>
          <div class="photo-preview" id="preview-${id}" style="${item.photo ? 'display:block' : ''}">
            ${item.photo ? `<img src="${item.photo}" alt="memory" />
            <button class="remove-photo" data-id="${id}">remove photo</button>` : ''}
          </div>
        </div>
      `;

      // Toggle done
      li.querySelector(".check-circle").addEventListener("click", () => toggleDone(id, item.done));
      li.querySelector(".item-text").addEventListener("click",   () => toggleDone(id, item.done));

      // Photo button
      li.querySelector(".photo-btn").addEventListener("click", e => {
        e.stopPropagation();
        openPhotoId = openPhotoId === id ? null : id;
        document.querySelectorAll(".photo-section").forEach(ps => ps.classList.remove("open"));
        if (openPhotoId === id) document.getElementById(`ps-${id}`).classList.add("open");
      });

      // File input
      const fileInput = li.querySelector(`#file-input-${id}`);
      if (fileInput) {
        fileInput.addEventListener("change", e => handlePhotoUpload(e, id));
      }

      // Remove photo
      const removeBtn = li.querySelector(".remove-photo");
      if (removeBtn) {
        removeBtn.addEventListener("click", e => { e.stopPropagation(); removePhoto(id); });
      }

      // Delete item
      li.querySelector(".del-btn").addEventListener("click", e => {
        e.stopPropagation();
        if (confirm(`Remove "${item.text}"?`)) remove(ref(db, `adventure-list/${id}`));
      });

      ul.appendChild(li);
    });

    // Confetti when a new item gets done
    const total = entries.length;
    if (doneCount > prevDoneCount && doneCount > 0) launchConfetti();
    prevDoneCount = doneCount;

    const pct = total === 0 ? 0 : Math.round((doneCount/total)*100);
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("progress-count").textContent = doneCount + " / " + total;

    const msgs = [
      "tap anything to get started 💕",
      "your first adventure ✨",
      "the fun is just beginning 🌸",
      "halfway there, love 🍃",
      "you two are unstoppable 🎉",
      "almost done! ♡",
      "one left — save the best 🌙",
      "you did everything together 🥂",
    ];
    const idx = total === 0 ? 0 : Math.min(Math.round((doneCount/total)*(msgs.length-1)), msgs.length-1);
    document.getElementById("footer-note").textContent = msgs[idx];
    document.getElementById("loading-msg").style.display = "none";
    document.getElementById("list-wrap").style.display = "block";
  }

  // ── Toggle done ───────────────────────────────────────────
  function toggleDone(id, current) {
    update(ref(db, `adventure-list/${id}`), { done: !current });
  }

  // ── Photo upload ──────────────────────────────────────────
  async function handlePhotoUpload(e, id) {
    const file = e.target.files[0];
    if (!file) return;
    showToast("uploading photo… 🌸");

    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const dataUrl = ev.target.result;
        const photoRef = sRef(storage, `photos/${id}`);
        await uploadString(photoRef, dataUrl, "data_url");
        const url = await getDownloadURL(photoRef);
        await update(ref(db, `adventure-list/${id}`), { photo: url });
        showToast("photo saved! 📷");
      } catch(err) {
        // Fallback: store as base64 directly in DB (for small images)
        try {
          const dataUrl = ev.target.result;
          await update(ref(db, `adventure-list/${id}`), { photo: dataUrl });
          showToast("photo saved! 📷");
        } catch(e2) {
          showToast("couldn't save photo — try a smaller image");
        }
      }
    };
    reader.readAsDataURL(file);
  }

  // ── Remove photo ──────────────────────────────────────────
  async function removePhoto(id) {
    await update(ref(db, `adventure-list/${id}`), { photo: "" });
    showToast("photo removed");
  }

  // ── Add item ──────────────────────────────────────────────
  document.getElementById("add-confirm").addEventListener("click", addItem);
  document.getElementById("new-text").addEventListener("keydown", e => { if (e.key==="Enter") addItem(); });

  function addItem() {
    const text  = document.getElementById("new-text").value.trim();
    const emoji = document.getElementById("selected-emoji").textContent;
    if (!text) { document.getElementById("new-text").focus(); return; }
    push(listRef, { text, emoji, done:false, photo:"" });
    document.getElementById("new-text").value = "";
    closePanel();
    showToast(`"${text}" added! 🌸`);
  }

  document.getElementById("add-open-btn").addEventListener("click", () => {
    document.getElementById("add-panel").style.display = "block";
    document.getElementById("add-open-btn").style.display = "none";
    setTimeout(() => document.getElementById("new-text").focus(), 50);
  });
  document.getElementById("add-cancel").addEventListener("click", closePanel);

  function closePanel() {
    document.getElementById("add-panel").style.display = "none";
    document.getElementById("add-open-btn").style.display = "flex";
    document.getElementById("new-text").value = "";
    document.getElementById("emoji-grid").style.display = "none";
  }

  // ── Emoji picker ──────────────────────────────────────────
  const grid = document.getElementById("emoji-grid");
  EMOJIS.forEach(e => {
    const btn = document.createElement("button");
    btn.className = "emoji-opt"; btn.textContent = e;
    btn.addEventListener("click", () => {
      document.getElementById("selected-emoji").textContent = e;
      grid.style.display = "none";
    });
    grid.appendChild(btn);
  });
  document.getElementById("emoji-trigger").addEventListener("click", () => {
    grid.style.display = grid.style.display === "flex" ? "none" : "flex";
  });

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = "1";
    t.style.transform = "translateX(-50%) translateY(0)";
    setTimeout(() => {
      t.style.opacity = "0";
      t.style.transform = "translateX(-50%) translateY(16px)";
    }, 2400);
  }

  // ── Confetti ──────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.getElementById("confetti-canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ["#E8A598","#F5DDD9","#A8B89C","#5C3D35","#FEFAF7","#D4A3C7"];
    const particles = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random()*colors.length)],
      vx: (Math.random()-0.5)*3,
      vy: Math.random()*3+2,
      rot: Math.random()*360,
      vr: (Math.random()-0.5)*6,
      shape: Math.random() > 0.5 ? "circle" : "rect"
    }));

    let frame;
    let elapsed = 0;

    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - elapsed/120);
        if (p.shape === "circle") {
          ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
        } else {
          ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
        }
        ctx.restore();
      });
      elapsed++;
      if (elapsed < 130) frame = requestAnimationFrame(draw);
      else { ctx.clearRect(0,0,canvas.width,canvas.height); cancelAnimationFrame(frame); }
    }
    draw();
  }

  function esc(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
